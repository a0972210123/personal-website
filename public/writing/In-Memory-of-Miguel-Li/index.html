oDkLT0BwEklTGi7pjgI+M4SSQbRJgV26SSCxXXLpJIA4SldJJAHCkUkkwI3oWfgpJJCKup4Koa7ukkpZpjM3XfUVT1HJSSWEj1MJHGbA/dPf8ASkksTpQ1h8qjl4SSVITGsPlCbIfKkkmSJhJaEnnypJJPoaHtJ2BRzfTdJJSUMe44+yEnPB9CkkqiTIaSmk/Se6SSp9E+RznGyiefM0pJKCjoJTbkP+4SSSGiOXug34cQkkriRIgkKSSSsg//2Q==", "bio": {"name_zh": "李維晏", "name_en": "Wei-Yan “Miguel” Li", "title": "國立臺灣大學寫作教學中心副教授兼中心主任", "dates": "????.03.24 — 2026.05.20（Miguel：才不告訴你哩）", "lead": "「教育是分享快樂的志業。」", "paras": ["李維晏（Miguel）是國立臺灣大學寫作教學中心副教授兼中心主任。她是排灣族，個性樂觀、談吐幽默，在共同教育領域開設「小故事，大世界」「框架外的思考：五分鐘英文講台」「工程學術英文寫作與口頭報告」「學術英文論文寫作與發表」「英文寫作基礎」等課程，選課人數動輒五、六百人，是台大學生口耳相傳、在 PTT 上「推爆」的傳奇教師。", "她畢業於美國奧馬市大學共同教育系，後赴英國杜倫大學取得英語及語言學碩士與教育學博士，曾任教於國立臺北教育大學、銘傳大學與東吳大學，最後落腳台大寫作教學中心。專長橫跨英語教學、學術寫作與口頭發表、英語教學法、師資培訓與溝通表達；她三度獲頒台大教學優良教師，並榮獲教學傑出教師。", "Miguel 的教學不靠取悅學生。她言詞犀利、評論一針見血，卻有一顆柔軟的心——她說，她發現台大學生其實很寂寞，於是開設「小故事，大世界」，讓每個學生都試著用英語說出一個故事、被好好地聽見。她相信「重點不在 what，而在 why」，要解決學生的問題，得先問對問題；她不相信單一一種教學法能教會所有人，於是翻轉教室、混合式教學、用色紙分組、設計「無痛換組」，只為讓每個學生都能在課堂裡找到自己的位置。", "她總能把艱深的知識，用最白話、最好懂的方式傳遞——這份本領，來自她自己的人生。赴英深造前夕家中遭逢變故，她回台擔任雙語幼兒園的英語老師，學著把複雜的東西講給連中文都還說不清楚的孩子聽。也許正因如此，無論面對的是幼兒、大學生還是博士生，她都能讓人聽懂、讓人想聽。", "在她的課堂上，笑聲幾乎沒有停過；下課後，學生帶走的不只是寫作與演講的技巧，還有看待人生的角度與勇氣。2026 年 5 月 20 日，Miguel 老師離開了我們。這個網站，收錄了十多年來、橫跨數十個學期、數百位學生留下的聲音——願這些故事，繼續被說下去。"], "facts": [["專長", "英語教學・學術寫作與口頭發表・英語教學法・師資培訓・溝通與表達"], ["學歷", "美國奧馬市大學共同教育系學士｜英國杜倫大學英語及語言學碩士、教育學博士"], ["榮譽", "台大教學優良教師（三度獲獎）・台大教學傑出教師"], ["代表課程", "小故事，大世界｜框架外的思考：五分鐘英文講台｜工程學術英文寫作與口頭報告"]]}, "board": {"form_url": "https://forms.gle/swWSbTJ9tWv3Ld3Z7", "csv_url": "https://docs.google.com/spreadsheets/d/1NOGhum9Kxy3pBlvoHIgcsih8moY8KPJNTqGP5Ndg34Y/export?format=csv&gid=0"}, "tributes": [{"title": "「沒有什麼事情是難的」——紀念李維晏老師", "author": "臺大寫作教學中心同仁", "date": "", "source": "本文由臺大寫作教學中心同仁共同整理資料、撰寫，部分內容引用自《臺大教學傑出教師的故事》及寫作教學中心歷年活動紀錄。", "body": "我們敬愛的李維晏老師，大家口中最棒的 Miguel，也是一路帶領寫作教學中心前行的主任，在這個夏日永遠離開了我們。\n我們總說Miguel是一個肩膀很寬的人。\n她總會下意識地側過身，替身旁的人多擋一點風雨。學校交付的新任務，她率先承擔；教學的新方向，她率先摸索。當學生陷入迷惘、找不出癥結時，她總會耐心傾聽、細心觀察，再給出犀利而中肯的建議。\n面對挑戰，Miguel向來從容篤定。當年參加寫作教學中心面試時，創立中心的蘇以文主任問及工作上可能遭遇的難處，她毫不猶豫地回答：「我覺得沒有什麼事情是難的。」\n這句回應，反映出她性格中直率與堅毅的一面，也成為她日後工作的寫照。幾年之後，Miguel接下寫作教學中心主任的重任。蘇以文主任任內，奠定了寫作教學中心的基礎，而 Miguel 則承續蘇主任的理念，帶領中心成長，不斷拓展服務的深度與廣度，陪伴更多師生在教學與學習的路上前行。\n而她，也用十幾年的時間，實踐了當年她對蘇主任說的那句話。每當學校交付新任務，她的第一反應永遠是「我們可以試試看」，總是率先站到中心同仁前面，把未知與不確定留給自己。直到真的遇到難以突破的困境，她才會轉身邀請大家攜手面對，說：「我們一起試試看。」正是這份慣於主動擔當的姿態，讓身邊的所有人都感到踏實、安心。\nMiguel 是一個藏不住創意的人，也是一個藏不住「在意」的人。她願意用盡一切力氣讓學生依靠，多年來，她辦公室的大門永遠為所有人敞開。她相信學英語不應該是孤獨的、焦慮的、也不該只侷限於課堂與課本。所以她創辦Fun with English，培養一批各有所長的輔導員，以一對一的方式陪伴同學，希望透過語言學習的樂趣，點燃學生持續精進的熱情。與此同時，她看見了學生「不敢開口」背後的困惑與迷茫，因此，她也帶領中心建立多元的寫作支援服務，讓學生在寫論文、交報告前能獲得專業的建議，有人一路相伴，一起梳理思路、琢磨文字。\n這些活動的背後都有著Miguel一貫的教學理念：學習的形式可以是充滿創意、多元的。她從不接受刻板、規律的課程，總是反覆問自己，還能怎麼讓它更有趣、更有效、更讓人想留下來。\n課堂上的她有著另一面——犀利、好玩、讓人措手不及。\n「小故事，大世界」這門課融合了歐美大學廣泛運用的故事敘事（storytelling）教學理念，Miguel 則是臺大首位將這套理念系統化引入課堂的老師。課程從故事架構、舞台表達等層面展開訓練，帶領大家把個人的經歷轉化為大眾的話題，培養兼具感染力與能在台上獨當一面的表達者。她充滿創意的教學方式，讓課程在每學期選課時都湧入大量慕名前來的人潮，期末也讓許多學生不捨離去，網路上詢問選課攻略的聲音更是始終不絕。\n「框架外的思考：五分鐘英文講台」的課程設計同樣能體現她的用心。她鼓勵學生先觀察生活難題，用創意設計解決方案，透過實際驗證與修正落實為企劃書，再以團隊形式完成簡報與英文演講，練習在有限的時間內清晰有力地傳達觀點。在她的引導下，學生跳出課堂邊界，憑藉課程所學參加各類競賽，不僅斬獲獎項，更有幸獲得國際企管大師的指點。或許，她的學生最終都會發覺，Miguel 想教的從來不只是溝通表達，更有推著學生走向未來，逼著他們突破思維框架、勇敢迎向挑戰的韌性。\n若教學是一場肩並肩的遠行，那麼，做研究對Miguel而言，就是為了幫學生提前探路所點上的燈。\n她不相信「憑感覺教學」這回事。對Miguel 而言，她要知道學生真正卡在哪裡，她想知道教學究竟是只流於形式，還是能讓學生真正累積能力？當 AI 浪潮襲來，教育又該如何回應科技帶來的改變？帶著來自課堂的困惑與靈感，她紮紮實實地投入研究，將日常教學淬鍊成可被檢驗、傳遞的方法。對她而言，研究背後的數據與文獻，來自於一個純粹的念頭——想為學生們撥開迷霧。一如她的教學初衷：先蹲下來，看清楚學生在哪裡，才知道自己該站在哪裡。\n從每一門課程的用心準備，到一次次研究成果的累積，她的視線始終緊跟著學生的需求。正是這份不願放手的愛與執著，逼著她必須看得比別人遠、走得比別人快，她要確保當大時代的浪潮拍打過來時，她的學生擁有前瞻性的視野與應對能力。\n正因如此，早在 2022 年 AI 還未大規模改變世界前，敏銳的她就已經率先推行 Writing with AI 的活動，大膽讓科技成為學生學習的第一份助力，搭配輔導員的實體諮詢，讓學習的速度與品質兼顧。\n而她大力推動，如今席捲各大校園的 3MT（三分鐘英語學術簡報）比賽，更是她送給全臺灣研究生的禮物。她堅信研究不該孤芳自賞，表達的力量與研究的深度同等重要，因此，這個活動從三所學校（臺大、臺師大、臺科大）一路推廣至全臺，讓學生能夠分享其學術研究成果，與不同背景的聽眾交流。直至 2025 年，敏銳的她再度跨出新的一步，透過視覺化展示的訓練，鼓勵學生打破學科的邊界、鍛鍊創新的思維，只為讓學生提升跨文化溝通的技巧，獲得與國際接軌的絕佳機會。\nMiguel曾獲頒三次臺大教學優良教師，更榮獲教學傑出教師的最高肯定。然而對 Miguel 而言，真正重要的是那些課堂結束多年後仍推開門找她敘舊的學生，是那些因為她的陪伴終於找到研究方向、找到表達的勇氣與樂趣的每一個學生。\n「教育是分享快樂的志業。」這是 Miguel常掛在嘴邊的一句話，也是她一生始終相信的信念。而要分享快樂，意味著要先願意毫無保留地敞開自己。這一生，Miguel都在努力打造能夠承接他人的所在，並且希望能再擴大一點，只為了能裝進更多人，擋下更多風雨。\n寫作教學中心的同仁將會記得Miguel說的，沒有什麼事是難的。\n而直到她離開之後，我們才明白，原來那些事情之所以沒有那麼難，是因為一直都是她走在前面。\n如今，我們將帶著她留下的信念，繼續陪伴每一位學生，讓這份對教育的熱忱、溫暖延續下去。"}], "tributes_placeholder": "更多懷念 Miguel 老師的生平側寫與紀念文字，整理中，將陸續刊登。", "carousel": [{"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "每次都是第一堂課點名，方式是簽名條。關於這堂課有好多想分享>\u003c 首先，是許多讓我感到特別用心的地方：\n 1.設想周到的分組方式 老師會請同學拿不同顏色的紙條，分別代表主動、被動、夜貓子、晨起型人，讓同學選擇組員時有參考依據，真的是十分的貼心!!! 而且還有前三週無痛直接換組的設計，也給予了同學更多的選擇空間\n 2.更換教室回應需求 由於後來加簽了許多同學，有人反映會沒位子坐，老師馬上就將上課教室改至普通一樓的大教室。有感受到老師盡力想給同學最好的上課體驗\n 3.超用心的課程提醒信 助教寫的提醒信超用心!!! 除了列出課程要求和內容外，也會分享一些生活裡的小趣事，感覺跟學生沒有什麼距離，每週都很期待提醒信寄來~\n Miguel：很有魅力的老師，又幽默實力又堅強，讓我每個星期一早上都充滿歡笑和啟發\n 總結：這門課應該是本學期最愛~ 課程設計十分用心、課程內容也很有意義，除了寫故事之外，更重要的是可以學習演講、練英文寫作和口說。整體來講真是又實用又有趣，大推!!!", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "109-2", "text": "太愛這堂課 一不小心就寫的有夠長 抱歉了\n 課程內容：Story of Self -> Story of Us -> Story of Now 老師們一開始會教一些關於說故事的技巧，還有提供一些優秀的範例，之後就是團體與個人的實作與聽同學分享他們的好作品。\n 分組方式：老師會以兩個面向把教室分成總共四個象限——Day/Night Person x Early Bird/Last Minute Fighter，讓大家按照自己的做事時間和風格找夥伴組成四人一組。個人覺得這個制度超讚的。\n 李維晏老師（Miguel）上課時間：學期初。感覺很豪爽的一位老師，上課常分享很多有趣的身邊故事，第一堂課真的是被老師的魅力煞到，就死心踏地的留下來了。\n 老師上課超好笑，常常分享很好笑的故事，如果可以修100遍我絕對修爆那種，非常非常值得修的一門課。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "Miguel講話真的很有魅力也很好笑，整門讓他上的話會聽到很多精彩好笑的故事XD 我記得某年修她的課，他說他剛回台大時在博雅煮火鍋結果被抓去罵，然後他就跟主管說「歐我們在部落都是想吃飯就直接煮，我想說這裡是我們的土ㄉ….噢抱歉忘記現在是漢人的。」從此再也沒有分心過。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "這堂真的是我在台大修最值得的一堂課。李維晏老師講話真的很好笑，常常講很好笑的地獄梗跟有趣的人生經歷。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "Miguel之前上課說：「大家看過復仇者聯盟3了嗎」很多人搖頭，「喔～ 鋼鐵人死了」哭啊我剛好那天晚上要去看= =", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "Miguel講話真的都超級好笑…我印象最深刻的是他跟他男友萬聖節去美國的鬼屋玩的故事，那個有夠可怕又好笑。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "我印象最深刻的是電影暴雷……（冰雪奇緣2剛上映的兩天後）老師：你們看冰雪奇緣2了嗎？大家：（搖頭）老師：哦，她妹妹成為了女王。Miguel……但是老師很有趣所以可以原諒老師。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "Miguel 說她國外的同學要追學校籃球隊隊長，結果Miguel當軍師幫她成功追到對方的故事XDD 老師出的主意是要同學模仿隊長媽媽的說話習慣、煮菜方式、用的香水（？）等，聽完真的目瞪口呆。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "我自己覺得整學期下來老師教你寫出來的故事會比較像Ted上面會聽到的那種，就是story of self, us, now。但還是在輕鬆愉快的氣氛下學到很多東西，覺得很棒，是目前修過最愛的課~\n Miguel老師的幽默事蹟不再贅述，她也是個很有邏輯的人，可以一針見血指出你故事（或人生?!）的問題點XD", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "推薦理由：首先老師上課很好玩就先推一波，上課完全不會無聊。再者老師更新課程內容蠻即時的，如果有新想法老師會蠻即時做為補充或是例子。\n 課程中教了很多說故事的技巧，作業和發表也都跟著教學進度增加難度或是依照不同用途修正作業要求，就是一門舒服而且收穫滿滿的課。\n 上課方式是以老師的簡報為主（簡報每個都好美 很用心），上課時很多時間是要和組員討論或分享想法。一學期有三個主題，要依照每個主題寫三篇3分鐘英文故事講稿。老師上課超好笑，常常分享很好笑的故事，如果可以修100遍我絕對修爆那種。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "小故事，大世界", "sem": "", "text": "老師講解風趣幽默，會時常講講自己的故事及經驗，每次上課都很期待，遇上某些節日時也會突然安排些活動。完全不會有壓力的一門課，沒有考試，只要大概寫3到4篇英文作文並與其他人分享即可，是我在其他重課下的慰藉XD", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "框架外的思考：五分鐘英文講台", "sem": "", "text": "老師講話很好笑，是真的很好笑，每週幾乎都會聽到他講一些他之前發生的故事。因為老師是原住民，所以有時候也會開原住民跟漢族的玩笑XD\n 我印象最深刻的是老師說他剛回台大教書時在博雅煮火鍋，害警報器響結果被叫去教務處，然後她就說「我不知道啊，以前在我們部落都是想煮就煮，我不知道漢人的規定，我以為這裡是我們的土ㄉ...喔抱歉現在不是了」\n 除此之外還有很多好笑的事，像是幫之前的助教抓她男友出軌、被電視台問到大學生都在上課吃飯的看法時直接拿東西出來吃之類的，反正很好笑XD", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "框架外的思考：五分鐘英文講台", "sem": "", "text": "上學期修過 推爆 老師人超好超幽默 很有自己的風格 而且也確實能學到很多簡報技巧 認真參與loading就蠻重的 分數紮實甜", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "學術英文寫作", "sem": "", "text": "老師個人風格獨特，是開朗、有活力的老師。他給學生的寫作建議是一針見血，對於學生的問題很能夠給出完整的答案。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "英文寫作（二）", "sem": "", "text": "課程概述：每節課會有一個當週要練習的寫作技巧/主題，配合著老師的ppt和handout在課堂上練習。對於程度普通的學生來說可能會比較吃力，不過這種在課堂上短時間高壓力的寫作練習是有效的。\n 優：Miguel老師是少數上大學以來真心感謝有幸遇到的師長。她的大二英文寫作能幫同學打好超級穩固的寫作基礎，就算在課堂上跟不上的同學也能參閱幾乎每堂都有的超精緻ppt來練習。這學期她的內容偏向academic writing，如果希望在大二好好增進自己的學術寫作的話，選Miguel的課絕對是the way to go。\n 一個學期下來老師也會騰出一些空間讓想要請教她的人可以有機會找他改文章、問生涯問題，更別提Miguel超超超級幽默！上他的課總是可以收穫很多又笑的很痛。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "學術英文寫作", "sem": "", "text": "Miguel真的是大愛 教得好 學得到東西 上課又好笑 還常常帶東西給大家吃", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "學術英文寫作", "sem": "", "text": "Miguel根本生涯導師哈哈哈笑瘋 愛死她", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "學術英文寫作", "sem": "", "text": "Miguel最棒啦！！ 我寫作不知道為什麼像得嗜睡一樣一直睡，Miguel的助教再三警告我不要再睡了不然要把我當掉，我之後就都死活不敢睡（雖然還是有偷睡幾次）結果我還是過了。有學到東西，上課又爆好笑，但講話速度超快，有濃濃的原民腔。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "學術英文寫作", "sem": "", "text": "大愛Miguel！而且Miguel還是台大寫作中心主任，她的寫作課真的上得很好！", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "學術英文寫作", "sem": "", "text": "有Miguel就推爆啦！覺得是一位很會因材施教的老師，給的東西都很有用，但不會一次太多資訊量讓人沒辦法吸收，只要每週有複習她上課的重點，基本上作業都沒問題，可以收穫很多！", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "實用英文寫作", "sem": "", "text": "我推李維晏老師，不過我之前上的是實用寫作。她人非常幽默風趣，在實務上也非常有經驗，跟她學寫作超棒的～", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "英文寫作基礎", "sem": "", "text": "老師教學風格：老師是位非常好笑的人XD 老師本身講話很好笑，所以上課氣氛活潑有趣。偶爾也會說自己的故事，個人覺得非常勵志和具有啟發性。老師很注重邏輯的思考和批判，這樣子寫出的作文才會大器。因此除了練習到英文寫作技巧外，還可以磨練自己的思考。\n 團體討論：老師會將班上同學分為6人一組，以討論的方式進行。一開始覺得很不習慣，不過這樣其實會讓同學們比較專心，也更印象深刻。老師會問問題，不先給答案，讓同學去腦力激盪和思考。班上同學都來自不同背景，其實可以了解不同同學的想法。\n 上課的進行方式是：小考20min->老師上課->最後30min助教帶文法。聖誕節老師有教我們唱聖誕歌XD 因此同學們過了愉快的一學期。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "course": "", "sem": "", "text": "謝謝老師為我所做的一切。能成為老師的學生是我人生最光榮的一件事情，希望老師能在另外一個世界仍然過得很好。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名（台大按摩社前社長）", "course": "", "sem": "", "text": "今天得知一個難過的消息，李維晏老師與世長辭了。她是台大按摩社多年的校內指導老師。社團有校內與校外指導老師，她雖然不是按摩專業，但她願意幫助按摩社在校內行政程序上順利進行。我作為台大按摩社前社長，謝謝李老師長期合作，感謝老師照顧台大按摩社。請您一路好走。", "source": "PTT/Dcard 課程心得彙整"}, {"name": "顏競廷", "course": "", "sem": "2025-2026", "text": "我印象最深刻的，是老師每次和我說「謝謝」的時候。他會帶著很真摯的感情，很溫柔的和你說謝謝。即便那可能是我份內的工作，仍會讓人覺得 I am really valued。\n \n— 謝謝Miguel，what you've taught me has influenced my career and my life.", "source": "人生畢業典禮留言板"}, {"name": "Bella", "course": "框架外的思考：五分鐘英文講台", "sem": "114-1", "text": "To Miguel 從小的夢想是幫助偏鄉教育。大一那年，我參加了一次提案競賽，結果輸得落花流水。因此大二時，我走進了 Miguel 的「框架外思考」課堂，雖然收穫滿滿，但最令我印象深刻的，是Miguel 無意中的那句：「你不要告訴我你要做 charity 喔。Charity is never charity; charity is business in the name of charity.」 這句話當頭棒喝般敲醒了台下迷茫的我，我終於知道大一那次失敗的原因了。而現在的我在做專案時，時時刻刻都會用這句話提醒自己、重新校準方向，並正朝著夢想一步步邁進。雖然二十歲的我，還沒辦法寫出一個多麼偉大的故事獻給 Miguel，但希望有一天，我可以創造屬於自己的小天地and Miguel will be proud of that.", "source": "人生畢業典禮留言板"}, {"name": "劉于榕", "course": "英文寫作基礎；工程學術英文寫作與口頭報告", "sem": "103-1；103-2", "text": "博士班一年級尾聲，我的人生第一篇 paper draft 卡到懷疑人生。在覺得自己像在深淵時看到課板上有人推薦寫作中心的課，很幸運地修到了 Miguel 的課。之後的我幾乎變成環工所 Miguel 教傳教士，逢人就說：「去修，真的會得救。」\n 修課時剛好碰上第一屆 3MT，要在短短幾分鐘內，把自己的研究講得清楚、還不能無聊。那時候很認真地介紹自己的研究，結果 Miguel 還沒等我說完，邊嚼著食物，就直接打斷我：「好無聊。」我當場笑出來。尤其當你的研究主題本身是poop water的時候，難度真的好高。直到現在，我都還在努力。\n 還記得，每次上課除了期待學到新東西和自己寫的東西如何被打磨拋光，更期待 Miguel 分享的各種 drama。感情的、論文的，不管是他自己的還是 TA 的，都超！精！彩！完全是研究生精神糧食。每次下課都氣力放盡，腦袋沒停過，笑聲也沒停過。\n 很神奇的是，Miguel 宇宙也一直默默把大家聚在一起。也是因為那些課，認識了萬能的助教夥伴。一路到現在，其實都默默牽回那段時間。\n 謝謝 Miguel。無論您現在在哪裡，我會記得您對教學的熱情、幽默的靈魂和爽朗的笑聲，很感謝人生有機會遇見您和您的快樂夥伴們。Happy Miguel, You will always be remembered.\n \n— 謝謝老師", "source": "人生畢業典禮留言板"}, {"name": "許哲榮", "course": "工程學術英文寫作與口頭報告", "sem": "108-1", "text": "You light up my dream, for real!\n \n— Miguel, forever in my heart!\n當年博士班第六年左右，我的學術英文寫作很差，沒上過正統課程，自以為寫得還行卻在投稿時被reject到爆，被老闆電到懷疑人生。那時，台大寫作中心主任Miguel老師有開「工程學術英文寫作與口頭報告」，但是太搶手，印象中每學年至少幾百人要抽籤搶修她的課，我好幾年都沒抽到。直到要去美國千里馬的前一年左右，我仍然沒抽到，我寫信拜託她，我說我夢想就是要走學術路，但是缺了學術論文寫作的功力，博士班已接近尾聲，再修不到她的課就沒機會了，請她給我一個修課的機會，她僅僅回了一字「行！」。開學第一天，我硬著頭皮到她課旁聽，而她真的留了一個名額給我！幾年過後，當我拿到高科大的offer，我很高興地跟她分享這個圓夢的好消息！直到今天，我還留著當年她給我的加選授權碼紙條。", "source": "人生畢業典禮留言板"}, {"name": "蔡璨鴻", "course": "小故事，大世界", "sem": "113-1", "text": "記得第一次見到老師的時候，她越過講台坐在第一排的桌子上，講著她在國外留學的一些趣事，那個笑聲爽朗地驅走了我下午第一節課的睡意。記得老師和我說過的第一句話，不知道是不幸還是大幸被分配到給老師點評我的故事，在我講完故事之後，她放下原本拿著我的稿子的手，直勾勾地看著我的眼睛說：「我太喜歡你的文字了！上台分享給同學聽好不好？」我愣了好一陣子，老師的眼睛就那麼望著我，慢慢等著我的回覆。當下突然想不起來上大學之後親耳聽到這麼真摯的稱讚是什麼時候了，我把這個瞬間放在心裡好久，沒有機會和老師說過我的感謝，那時候老師的眼神就像我媽媽小時候稱讚我的時候，說我今天值得一個蛋捲冰淇淋的樣子。 我不過只是一個老師給過A的學生，老師說不定也忘了我們曾經花過一個下午幫我潤我要上台的稿子，但我會記得，記得有一位老師曾經很喜歡很喜歡我的文字，祝老師畢業快樂！", "source": "人生畢業典禮留言板"}, {"name": "匿名", "course": "框架外的思考：五分鐘英文講台", "sem": "113-2", "text": "我最印象深刻的其實是老師在台大（可能?）遇見土地公的故事。老師在從活大走進去的時候遇到一個長相很傳統的老人，老人就對她說：「這一切是命，但你會撐過去的、而且你會有福報的。」老師感到納悶之餘，老人就消失了。再繼續走小徑的路上注意到小土地公廟，定睛一看才發現跟那個老人長的一樣！那天傍晚就收到弟弟的噩耗，接下來就開始處理其他事情。\n 故事之所以精彩，是因為驚心動魄的轉折與意想不到。老師很多故事都很戲劇化，並且在老師的巧言下變得更加有張力。但我希望老師能夠順遂就好，快樂就好。希望在您最後一段旅程之中，能擁有平和與富足。願您與您的神能夠團聚，輪到您講述這精采的一生給其他觀眾!!\n p.s. 我對於如何設計好的問卷也是透過老師的課！現在一直留在書包，有時候還會拿出來檢查哈哈哈\n \n— 雖然跟老師的緣分可能很短、了解老師的面向可能有點少，但是在線上畢業留言板看到大家闡述的老師，感覺又更知道了很多趣事以及老師的影響力！再次感謝您的指導！", "source": "人生畢業典禮留言板"}, {"name": "林澄 Bolt", "course": "小故事大世界；框架外思考", "sem": "113-1；114-1；2026", "text": "大一下的我，意外的選到了小故事大世界，是Miguel老師打開了我對大學生活的另一面，看著總是坐在博雅301桌上，邊上課邊吃零食甜點還瘋狂開著原住民梗的酷老師，讓我對上台有了不一樣的看法，或許有一天也能變成跟老師一樣自帶氣場的講者。\n 又過了一年，114-1學期好不容易排開必修，再度修到了框架外思考，在這堂課，跟Miguel 老師又更加的熟識，甚至課堂上他都以「外文系的」來稱呼我，並且念老師的簡報內容，成為了老師的御用讀稿機，也在期末時收到了老師的招募成為了EMI tutor加入了寫作中心的大家庭。\n 是Miguel帶領我進到上台表達自我，並且讓我看見不一樣的風景，也在過程中加入了歡樂的寫作中心，而老師那份對缺點毫不留情的口舌、那些原住民「蠻不講理」的笑話，還有那「桀驁不馴」地坐在博雅桌上吃著零食傳道授業的身影也將永遠留在大家的心中。", "source": "人生畢業典禮留言板"}, {"name": "Piper", "course": "框架外的思考：五分鐘英文講台", "sem": "107-1", "text": "老實說已經過了7、8年，我已經完全想不起來上課的內容，但留下來的印象只有Miguel真的是個非常有趣、每次上課都能帶給我快樂的教師。大一的時光對我來說已經很遙遠，但是相信Miguel的靈魂帶給他教過的學生的喜悅是刻印在大家的心底的～謝謝Miguel一直以來在台大的付出，框架外思考是一堂非常棒的課，是我大一課程增添精彩回憶的重要環節，願Miguel的靈魂可以去到美好的地方，也希望他所愛的家人朋友們能夠得到安慰。\n \n— 抱歉不太方便參與追思會，謝謝助教的通知，我才能知道這悲傷的消息，並為親愛的Miguel獻上祈禱。", "source": "人生畢業典禮留言板"}, {"name": "我的快樂大計畫", "course": "框架外的思考：五分鐘英文講台", "sem": "107-1", "text": "時隔八年，我還記得當初我們這組提出「我的快樂大計畫」的想法時，Miguel的形容是那天窗外下著雨，她喝著咖啡，看向窗外的雨滴落下。一方面想著這個proposal題目很有意義，一方面也想著這個題目很難執行。因此她陷入了兩難，但是真心誠懇地希望我們去試試看。\n 因為她的鼓勵與支持，這也是我遇到的一門很難得組員都很認真又很團結的通識課。回顧八年前的群組聊天紀錄，原來大家即使有很多期中期末考，還是願意擠出時間密集討論、來回修改這麼多次；原來在大學時期來自不同科系、不同年級的我們，主動提出不同建議的同時，也能虛心接受不同的意見，有禮的尊重不同想法，並在最後共同決定出一版現在看會覺得青澀又不得不佩服當時做出成果的我們。能夠遇到這群好組員，我覺得並非純粹是偶然運氣不錯，而是Miguel為這門課的設計與她教學的風格及影響力，讓我們很願意為世界變好而做出努力。\n 我還記得Miguel在課堂上分享過去溪頭受訓的故事，當初她一直抱怨爬山好累，幹嘛要來這邊受苦，但怎麼同梯的室友都不會這樣覺得。結果以為室友安靜淡然地接受這一切，但晚上聽到她說夢話：「為什麼要來溪頭？我不要去溪頭...」Miguel告訴我們說這是秘密，原來那位室友其實很壓抑自己的心，很有趣被她發現了。\n \n— 謝謝Miguel，也謝謝為這個活動付出的你們！\n這張照片是當時最後一堂課拍的，Miguel說她要站後面一點，因為這樣臉會比較小xD", "source": "人生畢業典禮留言板"}, {"name": "七七", "course": "作文課（東吳大學）", "sem": "", "text": "人生光鮮亮麗從來不是重點，真正重要的是實力。\n \n影片：https://youtube.com/shorts/nvyRnhsT6AE?si=6-AM3j2L7WdqGD0F\n \n— 都在影片裡了", "source": "人生畢業典禮留言板"}, {"name": "黃翊晟", "course": "小故事，大世界", "sem": "107-1（2018年）", "text": "「If you have something to bullshit about, then you have a story」 Miguel在第一堂課說的這句話，爾後成為我對這門課的記憶點，也是我與文字交會的十字路口，更是我人生志向的指標。課堂上的Miguel，像是將人生把玩在手中的角色，過往一切苦澀猶如魚露，在她幽默風趣的嘴上功夫烹調後，化為整到菜餚的甘甜與鮮美。\n 同樣發生在第一堂課：「辯論就能讓你贏得勝利，但故事可以讓你贏得人心」是Miguel，教會了我，面對人，重點不在於輸贏，而是能說到對方的心坎裡，站在對方的立場，設身處地為他人設想。\n 當初選擇這門課，純粹是出自好奇，從沒想過，我有機會站在全班面前，將自己在課堂上寫的作品朗讀出來，對於一個妥瑞氏症患者而言，那是極大的一種鼓勵，還記得當初自願當第一個上台朗讀的人，在說完自己的故事，接受同學喝采的那一刻，是多有成就感及滿足感的時刻。\n 如今，雖然不是用英文寫這些話，但文字與故事，已經成了我生活的一部分，在畢業後的這七年，我用文字與話語與學生溝通、理解，參與他們的過去、現在，以及未來；也用文字，將日常生活的點滴化為一片片文章；甚至到了最後，文字以書籍的方式，讓我創辦了讀書會，在失速的經濟列島上創造屬於自己的飛地，集結志同道合的友人，一起咀嚼文字、調味文字、創造文字。\n I know you had tons of things to bullshit about in the living world, then, bring them with you and say them out loud to the God in the heaven!\n \n— 雖然在畢業之後，一直沒有機會回去見妳一面，而我也早已忘記最後一次與你見面時，是發在什麼樣的場景，是有點可惜，但想起妳的時候，我的心中只有感激。感謝妳讓我有機會上這堂課；感謝妳邀請我到辦公室為我精進講稿，並且關心我；感謝妳讓我有機會、有勇氣，站在全班面前朗誦；感謝妳讓我愛上文字；感謝妳自此為我的人生帶來的光彩與熱情。", "source": "人生畢業典禮留言板"}, {"name": "Seam Huang", "course": "", "sem": "", "text": "天堂上的人有福了\n Miguel老師是我認識最會講笑話的天使。\n 我似乎都可以聽到天堂傳來的笑聲\n 羨慕\n 可惡我也很想停住眼淚\n 感覺您正在笑我愛哭\n 我們的對話要永遠暫停在這一刻了\n 謝謝老師在我最困難的時候總是不吝對我伸出援手\n 謝謝總是相信我的建議\n 我總覺得哪天我們還會在寫作中心一起聊寫作、一起聊研究、一起大聲歡笑。", "source": "人生畢業典禮留言板"}, {"name": "林咕基", "course": "", "sem": "", "text": "謝謝老師幫忙 沒有老師不會有現在的我\n 希望老師能在另外一個世界過得快樂", "source": "人生畢業典禮留言板"}, {"name": "Chin Yuan", "course": "", "sem": "", "text": "也太突然了……老師一路好走！", "source": "人生畢業典禮留言板"}, {"name": "陳承鴻", "course": "", "sem": "", "text": "感謝老師課堂上教的一切！！\n 除了寫作與簡報技巧，還有許多做研究與人生的啟發！", "source": "人生畢業典禮留言板"}, {"name": "William Wu", "course": "小故事，大世界", "sem": "", "text": "喜歡老師的小故事大世界\n Kept me pursuing writing ever since", "source": "人生畢業典禮留言板"}, {"name": "Kevin Sugianto 林偉明", "course": "", "sem": "", "text": "Grateful to have worked together with Miguel at the AWEC for these past 3 years. She personally selected me to be her consultant partner when I was still a student, worked with me even after I graduated from NTU and even still entrusted me with her last work on this semester before she passed away. Never thought that phone call she made to me 2 weeks ago would be the last, and she's still talking about work enthusiastically like nothing happened… rest in peace, beautiful soul.", "source": "追思會留言"}, {"name": "梁筠敏", "course": "", "sem": "", "text": "妳是我這輩子最喜愛和敬重的老師，帶給我有形無形的影響至今都依然存在，謝謝妳，能當妳的學生是件非常幸運且幸福的事。", "source": "追思會留言"}, {"name": "葉紫芳", "course": "", "sem": "", "text": "老師我好想你喔，你說今年只有收到我給你的生日蛋糕，我還想要跟你繼續慶祝每一年的生日…", "source": "追思會留言"}, {"name": "Sophie Syu", "course": "", "sem": "", "text": "與老師相處總是快樂的. 謝謝老師的指導與帶領\n 學生 Sophie Syu 敬輓\n 感謝細心籌辦老師追思會的人員.", "source": "追思會留言"}, {"name": "王道一", "course": "", "sem": "", "text": "身為Miguel的啦啦隊，實在不知道怎麼說。不過追思會請不要特別考慮我的時間，因為我可以的時間也是端午節連假，應該對學生不太方便。", "source": "追思會留言"}, {"name": "蘇政維", "course": "", "sem": "", "text": "感謝老師這一個半學期的教導", "source": "追思會留言"}, {"name": "廖士翔", "course": "", "sem": "", "text": "謝謝老師", "source": "追思會留言"}], "courses": [{"name": "小故事，大世界", "count": 250, "semesters": ["106-1", "106-2", "107-1", "108-1", "108-2", "109-1", "111-2", "112-2", "113-1", "113-2"], "synthesis": "這是 Miguel 最具代表性的通識課，自 106 學年起十年間累積了數百則回饋。學生最常提到的，是她說故事的魅力——每堂課穿插的人生故事讓人「笑到肚子痛」，卻又在歡笑中學會 Story of Self／Us／Now 的敘事架構。許多人形容這是「大學生涯最愛、最想一修再修」的一門課；她對故事（甚至對人生）「一針見血」的講評、用心設計的分組與每週貼心的提醒信，都讓人難忘。", "quotes": [{"name": "黃翊晟", "sem": "107-1（2018年）", "text": "「If you have something to bullshit about, then you have a story」 Miguel在第一堂課說的這句話，爾後成為我對這門課的記憶點，也是我與文字交會的十字路口，更是我人生志向的指標。課堂上的Miguel，像是將人生把玩在手中的角色，過往一切苦澀猶如魚露，在她幽默風趣的嘴上功夫烹調後，化為整到菜餚的甘甜與鮮美。\n 同樣發生在第一堂課：「辯論就能讓你贏得勝利，但故事可以讓你贏得人心」是Miguel，教會了我，面對人，重點不在於輸贏，而是能說到對方的心坎裡，站在對方的立場，設身處地為他人設想。\n 當初選擇這門課，純粹是出自好奇，從沒想過，我有機會站在全班面前，將自己在課堂上寫的作品朗讀出來，對於一個妥瑞氏症患者而言，那是極大的一種鼓勵，還記得當初自願當第一個上台朗讀的人，在說完自己的故事，接受同學喝采的那一刻，是多有成就感及滿足感的時刻。\n 如今，雖然不是用英文寫這些話，但文字與故事，已經成了我生活的一部分，在畢業後的這七年，我用文字與話語與學生溝通、理解，參與他們的過去、現在，以及未來；也用文字，將日常生活的點滴化為一片片文章；甚至到了最後，文字以書籍的方式，讓我創辦了讀書會，在失速的經濟列島上創造屬於自己的飛地，集結志同道合的友人，一起咀嚼文字、調味文字、創造文字。\n I know you had tons of things to bullshit about in the living world, then, bring them with you and say them out loud to the God in the heaven!\n \n— 雖然在畢業之後，一直沒有機會回去見妳一面，而我也早已忘記最後一次與你見面時，是發在什麼樣的場景，是有點可惜，但想起妳的時候，我的心中只有感激。感謝妳讓我有機會上這堂課；感謝妳邀請我到辦公室為我精進講稿，並且關心我；感謝妳讓我有機會、有勇氣，站在全班面前朗誦；感謝妳讓我愛上文字；感謝妳自此為我的人生帶來的光彩與熱情。", "source": "人生畢業典禮留言板"}, {"name": "蔡璨鴻", "sem": "113-1", "text": "記得第一次見到老師的時候，她越過講台坐在第一排的桌子上，講著她在國外留學的一些趣事，那個笑聲爽朗地驅走了我下午第一節課的睡意。記得老師和我說過的第一句話，不知道是不幸還是大幸被分配到給老師點評我的故事，在我講完故事之後，她放下原本拿著我的稿子的手，直勾勾地看著我的眼睛說：「我太喜歡你的文字了！上台分享給同學聽好不好？」我愣了好一陣子，老師的眼睛就那麼望著我，慢慢等著我的回覆。當下突然想不起來上大學之後親耳聽到這麼真摯的稱讚是什麼時候了，我把這個瞬間放在心裡好久，沒有機會和老師說過我的感謝，那時候老師的眼神就像我媽媽小時候稱讚我的時候，說我今天值得一個蛋捲冰淇淋的樣子。 我不過只是一個老師給過A的學生，老師說不定也忘了我們曾經花過一個下午幫我潤我要上台的稿子，但我會記得，記得有一位老師曾經很喜歡很喜歡我的文字，祝老師畢業快樂！", "source": "人生畢業典禮留言板"}, {"name": "匿名", "sem": "109-2", "text": "太愛這堂課 一不小心就寫的有夠長 抱歉了\n 課程內容：Story of Self -> Story of Us -> Story of Now 老師們一開始會教一些關於說故事的技巧，還有提供一些優秀的範例，之後就是團體與個人的實作與聽同學分享他們的好作品。\n 分組方式：老師會以兩個面向把教室分成總共四個象限——Day/Night Person x Early Bird/Last Minute Fighter，讓大家按照自己的做事時間和風格找夥伴組成四人一組。個人覺得這個制度超讚的。\n 李維晏老師（Miguel）上課時間：學期初。感覺很豪爽的一位老師，上課常分享很多有趣的身邊故事，第一堂課真的是被老師的魅力煞到，就死心踏地的留下來了。\n 老師上課超好笑，常常分享很好笑的故事，如果可以修100遍我絕對修爆那種，非常非常值得修的一門課。", "source": "PTT/Dcard 課程心得彙整"}]}, {"name": "框架外的思考：五分鐘英文講台", "count": 123, "semesters": ["105-1", "105-2", "106-1", "106-2", "107-1", "108-1", "108-2", "110-1", "110-2", "111-1", "111-2", "112-2", "113-2"], "synthesis": "在「框架外的思考」裡，Miguel 帶學生從零寫出一份英文企劃案，並透過真實專案（如幫助「希恩之家」）與校外競賽實際操練。學生說她把艱澀的學術與商業寫作，拆解成清晰好用的架構（SPSE、DE-FEAR、Why-What-How-If），上課幽默又一針見血，常以自身故事啟發思考；不少人因此「被圈粉」、把她當成一生的 role model。", "quotes": [{"name": "Bella", "sem": "114-1", "text": "To Miguel 從小的夢想是幫助偏鄉教育。大一那年，我參加了一次提案競賽，結果輸得落花流水。因此大二時，我走進了 Miguel 的「框架外思考」課堂，雖然收穫滿滿，但最令我印象深刻的，是Miguel 無意中的那句：「你不要告訴我你要做 charity 喔。Charity is never charity; charity is business in the name of charity.」 這句話當頭棒喝般敲醒了台下迷茫的我，我終於知道大一那次失敗的原因了。而現在的我在做專案時，時時刻刻都會用這句話提醒自己、重新校準方向，並正朝著夢想一步步邁進。雖然二十歲的我，還沒辦法寫出一個多麼偉大的故事獻給 Miguel，但希望有一天，我可以創造屬於自己的小天地and Miguel will be proud of that.", "source": "人生畢業典禮留言板"}, {"name": "我的快樂大計畫", "sem": "107-1", "text": "時隔八年，我還記得當初我們這組提出「我的快樂大計畫」的想法時，Miguel的形容是那天窗外下著雨，她喝著咖啡，看向窗外的雨滴落下。一方面想著這個proposal題目很有意義，一方面也想著這個題目很難執行。因此她陷入了兩難，但是真心誠懇地希望我們去試試看。\n 因為她的鼓勵與支持，這也是我遇到的一門很難得組員都很認真又很團結的通識課。回顧八年前的群組聊天紀錄，原來大家即使有很多期中期末考，還是願意擠出時間密集討論、來回修改這麼多次；原來在大學時期來自不同科系、不同年級的我們，主動提出不同建議的同時，也能虛心接受不同的意見，有禮的尊重不同想法，並在最後共同決定出一版現在看會覺得青澀又不得不佩服當時做出成果的我們。能夠遇到這群好組員，我覺得並非純粹是偶然運氣不錯，而是Miguel為這門課的設計與她教學的風格及影響力，讓我們很願意為世界變好而做出努力。\n 我還記得Miguel在課堂上分享過去溪頭受訓的故事，當初她一直抱怨爬山好累，幹嘛要來這邊受苦，但怎麼同梯的室友都不會這樣覺得。結果以為室友安靜淡然地接受這一切，但晚上聽到她說夢話：「為什麼要來溪頭？我不要去溪頭...」Miguel告訴我們說這是秘密，原來那位室友其實很壓抑自己的心，很有趣被她發現了。\n \n— 謝謝Miguel，也謝謝為這個活動付出的你們！\n這張照片是當時最後一堂課拍的，Miguel說她要站後面一點，因為這樣臉會比較小xD", "source": "人生畢業典禮留言板"}, {"name": "匿名", "sem": "113-2", "text": "我最印象深刻的其實是老師在台大（可能?）遇見土地公的故事。老師在從活大走進去的時候遇到一個長相很傳統的老人，老人就對她說：「這一切是命，但你會撐過去的、而且你會有福報的。」老師感到納悶之餘，老人就消失了。再繼續走小徑的路上注意到小土地公廟，定睛一看才發現跟那個老人長的一樣！那天傍晚就收到弟弟的噩耗，接下來就開始處理其他事情。\n 故事之所以精彩，是因為驚心動魄的轉折與意想不到。老師很多故事都很戲劇化，並且在老師的巧言下變得更加有張力。但我希望老師能夠順遂就好，快樂就好。希望在您最後一段旅程之中，能擁有平和與富足。願您與您的神能夠團聚，輪到您講述這精采的一生給其他觀眾!!\n p.s. 我對於如何設計好的問卷也是透過老師的課！現在一直留在書包，有時候還會拿出來檢查哈哈哈\n \n— 雖然跟老師的緣分可能很短、了解老師的面向可能有點少，但是在線上畢業留言板看到大家闡述的老師，感覺又更知道了很多趣事以及老師的影響力！再次感謝您的指導！", "source": "人生畢業典禮留言板"}]}, {"name": "工程學術英文寫作與口頭報告", "count": 46, "semesters": ["104-1", "104-2", "105-1", "105-2", "106-1", "106-2", "107-1", "108-1", "108-2", "109-1", "109-2", "112-1", "112-2", "113-1", "113-2"], "synthesis": "這門專為理工領域設計的課，教學生寫好一篇 paper——從 IMRD 架構、投稿眉角到 3MT 口頭報告。學生說她把寫作要點彙整成「系統化的公式」，配合大量真實文獻案例，讓人克服用英文表達論述的障礙，也學會善用 AI 工具。除了專業，許多人記得的是她的人生態度：「錢永遠不是問題，只要自己夠強」這句話，曾在低潮中給了學生很大的衝擊與力量。", "quotes": [{"name": "許哲榮", "sem": "108-1", "text": "You light up my dream, for real!\n \n— Miguel, forever in my heart!\n當年博士班第六年左右，我的學術英文寫作很差，沒上過正統課程，自以為寫得還行卻在投稿時被reject到爆，被老闆電到懷疑人生。那時，台大寫作中心主任Miguel老師有開「工程學術英文寫作與口頭報告」，但是太搶手，印象中每學年至少幾百人要抽籤搶修她的課，我好幾年都沒抽到。直到要去美國千里馬的前一年左右，我仍然沒抽到，我寫信拜託她，我說我夢想就是要走學術路，但是缺了學術論文寫作的功力，博士班已接近尾聲，再修不到她的課就沒機會了，請她給我一個修課的機會，她僅僅回了一字「行！」。開學第一天，我硬著頭皮到她課旁聽，而她真的留了一個名額給我！幾年過後，當我拿到高科大的offer，我很高興地跟她分享這個圓夢的好消息！直到今天，我還留著當年她給我的加選授權碼紙條。", "source": "人生畢業典禮留言板"}, {"name": "劉于榕", "sem": "103-1；103-2", "text": "博士班一年級尾聲，我的人生第一篇 paper draft 卡到懷疑人生。在覺得自己像在深淵時看到課板上有人推薦寫作中心的課，很幸運地修到了 Miguel 的課。之後的我幾乎變成環工所 Miguel 教傳教士，逢人就說：「去修，真的會得救。」\n 修課時剛好碰上第一屆 3MT，要在短短幾分鐘內，把自己的研究講得清楚、還不能無聊。那時候很認真地介紹自己的研究，結果 Miguel 還沒等我說完，邊嚼著食物，就直接打斷我：「好無聊。」我當場笑出來。尤其當你的研究主題本身是poop water的時候，難度真的好高。直到現在，我都還在努力。\n 還記得，每次上課除了期待學到新東西和自己寫的東西如何被打磨拋光，更期待 Miguel 分享的各種 drama。感情的、論文的，不管是他自己的還是 TA 的，都超！精！彩！完全是研究生精神糧食。每次下課都氣力放盡，腦袋沒停過，笑聲也沒停過。\n 很神奇的是，Miguel 宇宙也一直默默把大家聚在一起。也是因為那些課，認識了萬能的助教夥伴。一路到現在，其實都默默牽回那段時間。\n 謝謝 Miguel。無論您現在在哪裡，我會記得您對教學的熱情、幽默的靈魂和爽朗的笑聲，很感謝人生有機會遇見您和您的快樂夥伴們。Happy Miguel, You will always be remembered.\n \n— 謝謝老師", "source": "人生畢業典禮留言板"}]}, {"name": "英文寫作基礎", "count": 24, "semesters": ["104-1", "104-2", "109-2", "110-1", "110-2", "111-1", "111-2"], "synthesis": "在這門小班寫作課裡，Miguel 用清楚、有架構又有趣的方式，帶學生打好英文寫作的地基。學生稱讚她的簡報精緻、診斷問題「一針見血」、課後還會撥空一對一輔導，也欣賞她把邏輯思考與批判帶進寫作。", "quotes": [{"name": "匿名", "sem": "", "text": "老師教學風格：老師是位非常好笑的人XD 老師本身講話很好笑，所以上課氣氛活潑有趣。偶爾也會說自己的故事，個人覺得非常勵志和具有啟發性。老師很注重邏輯的思考和批判，這樣子寫出的作文才會大器。因此除了練習到英文寫作技巧外，還可以磨練自己的思考。\n 團體討論：老師會將班上同學分為6人一組，以討論的方式進行。一開始覺得很不習慣，不過這樣其實會讓同學們比較專心，也更印象深刻。老師會問問題，不先給答案，讓同學去腦力激盪和思考。班上同學都來自不同背景，其實可以了解不同同學的想法。\n 上課的進行方式是：小考20min->老師上課->最後30min助教帶文法。聖誕節老師有教我們唱聖誕歌XD 因此同學們過了愉快的一學期。", "source": "PTT/Dcard 課程心得彙整"}]}, {"name": "自我探索寫作系列：履歷自薦信與自我行銷", "count": 11, "semesters": ["104-1"], "synthesis": "這是一門非常貼近大學生需求的實用課：從完全不懂 Resume／CV，到能寫出一篇得到老師肯定的文章，還有模擬面試的經驗。有同學因老師的協助順利錄取了管院的產學計畫。課程氣氛輕鬆有趣、緊湊不冷場，許多人直呼六週實在太短、意猶未盡，希望能跟著老師上得更久。", "quotes": []}, {"name": "自我探索寫作系列：自傳與自我行銷", "count": 11, "semesters": ["104-1"], "synthesis": "在自傳與自我行銷的課堂上，學生學到的不只是寫作技巧。許多人印象最深的，是 Miguel 給的一個提問——「你有沒有走在自己想要走的路上？」這句話讓人時時自省、對未來有了更清楚的規劃。課程實用、老師魅力十足，同學們普遍希望課程時數能再長一些，也期待醫學院區能開設類似的課。", "quotes": []}, {"name": "深造規劃英文寫作", "count": 7, "semesters": ["104-2"], "synthesis": "這門幫助學生規劃出國深造的課，教 CV、SOP 的寫法，更像一場心靈探索——帶大家檢視自己的人生規劃、釐清自己是怎樣的人。小班制讓師生能一對一諮詢、彼此認識，被不少同學列為「大學以來最喜歡、最有收穫」的一門課。", "quotes": []}, {"name": "讀中生智：英文批判閱讀", "count": 5, "semesters": ["108-2"], "synthesis": "這是一門扎實的英文批判閱讀課。學生說 Miguel 教學認真、風格有趣，擅長帶動討論氣氛，課程規劃結合實務、不流於理論，讓人確實培養出批判性閱讀的能力。", "quotes": []}, {"name": "學術英文論文寫作與發表", "count": 4, "semesters": ["106-1", "112-1"], "synthesis": "在這門論文寫作課裡，Miguel 教學脈絡清晰、三次作業都仔細批改，學生從她的修改中學到很多，連中文寫作也一併受惠。她也為學生爭取資源、犧牲下班時間協助諮詢改稿。", "quotes": []}, {"name": "經濟學英文寫作基礎", "count": 3, "semesters": ["108-1"], "synthesis": "雖然回饋不多，但都很真摯：學生說「Miguel 絕對是台大最棒的老師之一」，稱讚她認真地想把所會的都交給學生，能把有脈絡、有邏輯的文法與寫作知識連貫起來，讓人耳目一新。", "quotes": []}, {"name": "科學研究與寫作", "count": 3, "semesters": ["113-2"], "synthesis": "這是 Miguel 在 113 學年開設的課。學生說她「很有料」，教的東西讓人大開眼界——當他們與在美國讀書的同學分享課堂所學，才發現自己已經被訓練出國際與研究上的競爭力。師生互動良好、氣氛幽默。", "quotes": []}, {"name": "醫學研究與論文發表", "count": 1, "semesters": ["106-1"], "synthesis": "僅有一則回饋，但精準地道出了她的課堂特質：舉例實用、上課有趣、吸引人。", "quotes": []}, {"name": "學術英文寫作", "count": 1, "semesters": ["106-2"], "synthesis": "Miguel 是寫作教學中心主任，她的學術英文寫作課（含在東吳開設的寫作課）廣受好評。學生形容她個人風格獨特、開朗有活力，給的寫作建議一針見血、又懂得因材施教，「給的東西都很有用，但不會一次太多讓人無法吸收」；課堂幽默到讓人「上課又好笑、學得到東西」，更有人直呼她根本是自己的生涯導師。", "quotes": [{"name": "匿名", "sem": "", "text": "Miguel根本生涯導師哈哈哈笑瘋 愛死她", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "sem": "", "text": "有Miguel就推爆啦！覺得是一位很會因材施教的老師，給的東西都很有用，但不會一次太多資訊量讓人沒辦法吸收，只要每週有複習她上課的重點，基本上作業都沒問題，可以收穫很多！", "source": "PTT/Dcard 課程心得彙整"}, {"name": "匿名", "sem": "", "text": "老師個人風格獨特，是開朗、有活力的老師。他給學生的寫作建議是一針見血，對於學生的問題很能夠給出完整的答案。", "source": "PTT/Dcard 課程心得彙整"}]}], "stats": {"comments": 536, "courses": 13, "span": "104 — 113 學年"}, "footer": "本網站留言彙整自學生的課程回饋、人生畢業典禮留言板與追思會留言。匿名回饋以「綜合意見」方式呈現，不公開個別內容；具名留言依其公開意願收錄，仍在持續確認與校訂中。"};

/* carousel */
let pool=DATA.carousel.slice(), idx=0;
function metaHtml(c){
  let p=[]; if(c.name)p.push('<span class="q-name">'+esc(c.name)+'</span>');
  if(c.course)p.push('<span class="chip">'+esc(c.course)+'</span>');
  if(c.sem)p.push('<span class="chip">'+esc(c.sem)+'</span>');
  if(c.source)p.push('<span>'+esc(c.source)+'</span>');
  return p.join('');
}
function render(){
  if(!pool.length){$('#qtext').textContent='（沒有符合的留言）';$('#qmeta').innerHTML='';$('#pos').textContent='0 / 0';return;}
  idx=(idx%pool.length+pool.length)%pool.length;
  const c=pool[idx];
  $('#qtext').textContent=c.text;
  $('#qmeta').innerHTML=metaHtml(c);
  $('#pos').textContent=(idx+1)+' / '+pool.length;
  $('#qcard').scrollTop=0;
}
function adv(n){idx+=n;render()}
$('#qcard').onclick=()=>adv(1);
$('#qcard').onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();adv(1)}};
$('#next').onclick=e=>{e.stopPropagation();adv(1)};
$('#prev').onclick=e=>{e.stopPropagation();adv(-1)};
$('#shuffle').onclick=e=>{e.stopPropagation();idx=Math.floor(Math.random()*pool.length);render()};
$('#q').oninput=function(){
  const t=this.value.trim().toLowerCase();
  pool=DATA.carousel.filter(c=>!t||(c.text+c.name+c.course+c.sem).toLowerCase().includes(t));
  idx=0;
  $('#vcount').textContent=pool.length+' / '+DATA.carousel.length+' 則';
  render();
};
$('#vcount').textContent=DATA.carousel.length+' / '+DATA.carousel.length+' 則';
render();

/* message board (live from public Google Sheet CSV) */
(function(){
  const B=DATA.board||{};
  if(B.form_url) $('#boardBtn').href=B.form_url;
  function parseCSV(s){
    const rows=[]; let row=[], cur='', q=false;
    for(let i=0;i<s.length;i++){const ch=s[i];
      if(q){ if(ch==='"'){ if(s[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else { if(ch==='"')q=true; else if(ch===','){row.push(cur);cur='';}
        else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
        else if(ch==='\r'){} else cur+=ch; } }
    if(cur!==''||row.length){row.push(cur);rows.push(row);}
    return rows.filter(r=>r.some(c=>c.trim()));
  }
  function setState(msg){$('#boardWall').innerHTML='<div class="board-state">'+esc(msg)+'</div>';}
  let all=[];
  function draw(list){
    if(!list.length){setState(all.length?'找不到符合的留言':'目前還沒有留言，歡迎成為第一個 ✍️');return;}
    $('#boardWall').innerHTML=list.map(m=>{
      const chips=[m.relation,m.course].filter(Boolean).map(x=>'<span class="chip">'+esc(x)+'</span>').join('');
      return '<div class="bcard"><div class="bt">'+esc(m.text)+'</div>'+
        '<div class="bm"><span class="q-name">'+esc(m.name||'匿名')+'</span>'+chips+'</div></div>';
    }).join('');
  }
  function search(){
    const t=$('#bq').value.trim().toLowerCase();
    const list=all.filter(m=>!t||(m.text+m.name+m.relation+m.course).toLowerCase().includes(t));
    $('#bcount').textContent=list.length+' / '+all.length+' 則';
    draw(list);
  }
  if(!B.csv_url){setState('目前還沒有留言，歡迎成為第一個 ✍️');return;}
  fetch(B.csv_url).then(r=>{if(!r.ok)throw new Error(r.status);return r.text();}).then(txt=>{
    const rows=parseCSV(txt); rows.shift(); // drop header
    all=rows.map(r=>({ts:r[0]||'',name:r[1]||'',relation:r[2]||'',course:r[3]||'',text:r[4]||''}))
      .filter(m=>m.text.trim())
      .sort((a,b)=>(b.ts>a.ts?1:b.ts<a.ts?-1:0)); // newest first
    $('#bq').oninput=search;
    search();
  }).catch(e=>{ setState('留言載入中斷，請稍後重新整理。'); });
})();

/* courses */
$('#courseList').innerHTML=DATA.courses.map(c=>{
  const sem=c.semesters&&c.semesters.length?'<span class="sems">'+esc(c.semesters[0]+(c.semesters.length>1?(' – '+c.semesters[c.semesters.length-1]):'')+' 學年')+'</span>':'';
  const badge=c.count?'<span class="badge">'+c.count+' 則學生回饋</span>':'';
  const quotes=(c.quotes||[]).map(q=>
    '<div class="pq"><div class="t">'+esc(q.text)+'</div><div class="m"><b>'+esc(q.name||'匿名')+'</b>'+
    (q.sem?' ・ '+esc(q.sem):'')+(q.source?' ・ '+esc(q.source):'')+'</div></div>').join('');
  return '<div class="course"><div class="course-h"><h3>'+esc(c.name)+'</h3>'+badge+sem+'</div>'+
    '<p class="syn">'+esc(c.synthesis)+'</p>'+
    (quotes?'<div class="pquotes">'+quotes+'</div>':'')+'</div>';
}).join('');

/* theme */
const tb=$('#themeBtn');
function setT(m){document.documentElement.setAttribute('data-theme',m);tb.textContent=m==='dark'?'☀️':'🌙';try{localStorage.setItem('mtheme',m)}catch(e){}}
let init='light';try{init=localStorage.getItem('mtheme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')}catch(e){}
setT(init);
tb.onclick=()=>setT(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
</script>
</body>
</html>
